# Cut a frozen docs version when waas publishes a release tag.
#
# Two triggers:
#  - workflow_dispatch: run it by hand with the waas tag (the nominal
#    path for now — one click, one PR to review);
#  - repository_dispatch (type waas-release): lets the waas repo
#    automate the same thing later by POSTing
#      {"event_type":"waas-release","client_payload":{"version":"vX.Y.Z"}}
#    with a token that has `contents:write` on this repo. Nothing on the
#    waas side depends on this yet — manual dispatch is the documented
#    procedure (see CONTRIBUTING.md).
#
# The job syncs the CRD schemas at the tag, regenerates the reference,
# runs `docusaurus docs:version <tag>` and opens a PR — never a direct
# push to main.
name: version-cut

on:
  workflow_dispatch:
    inputs:
      version:
        description: "waas release tag (vX.Y.Z)"
        required: true
        type: string
  repository_dispatch:
    types: [waas-release]

jobs:
  cut:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - id: ver
        env:
          RAW: ${{ inputs.version || github.event.client_payload.version }}
        run: |
          if ! printf '%s' "$RAW" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::'$RAW' is not a vX.Y.Z tag"; exit 1
          fi
          echo "version=$RAW" >> "$GITHUB_OUTPUT"

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: npm ci

      - name: Sync CRD schemas at the released tag
        run: node scripts/sync-crd-schemas.mjs --ref ${{ steps.ver.outputs.version }}

      - name: Cut the Docusaurus version
        run: |
          npm run gen:crd
          npm run docusaurus docs:version ${{ steps.ver.outputs.version }}

      # Site policy: serve only the latest release + Next. Older
      # snapshots stay in git history; their /vX.Y.Z/ URLs go away.
      - name: Prune older versions
        env:
          KEEP: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const keep = process.env.KEEP;
            const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));
            for (const v of versions.filter((v) => v !== keep)) {
              console.log(`pruning ${v}`);
              fs.rmSync(`versioned_docs/version-${v}`, {recursive: true, force: true});
              fs.rmSync(`versioned_sidebars/version-${v}-sidebars.json`, {force: true});
            }
            fs.writeFileSync("versions.json", JSON.stringify([keep], null, 2) + "\n");
          '

      - name: Sanity build
        run: npm run build

      - name: Open the version PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: version-cut/${{ steps.ver.outputs.version }}
          commit-message: "docs: cut version ${{ steps.ver.outputs.version }}"
          title: "docs: cut version ${{ steps.ver.outputs.version }}"
          body: |
            Freezes the current docs as **${{ steps.ver.outputs.version }}**
            (waas release tag), with the CRD schemas synced at that tag.
            Older version snapshots are pruned — the site serves only
            the latest release and Next.

            Generated by the `version-cut` workflow — review the diff
            (versioned_docs/, versioned_sidebars/, versions.json,
            crd-schemas/) and merge.
