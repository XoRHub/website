# Build on every PR; build + deploy to GitHub Pages on push to main.
# Deployment uses actions/deploy-pages (no gh-pages branch to maintain).
# Pages must be enabled once with source "GitHub Actions" (already done
# for this repo) — no self-enablement step in the workflow.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Toolchain from .mise.toml — the same pins `mise install` uses
      # locally, one source for both (same doctrine as the waas repo).
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - run: npm ci
      - run: npm run typecheck
      # prebuild regenerates the CRD reference pages from the vendored
      # schemas (npm run gen:crd), then Docusaurus builds every version.
      - run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
