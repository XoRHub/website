# Single source of truth for toolchain versions — same doctrine as the
# waas repo: CI installs from this very file too (jdx/mise-action in
# .github/workflows/), so local and CI cannot drift.
[tools]
# Docusaurus build/serve toolchain. Keep in sync with waas's node pin
# when convenient, but this site has no build coupling with waas.
node = "22.23.1"
